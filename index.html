<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на свадьбу</title>
    <style>
        body {
            background-color: #111411;
            color: #ffffff;
            font-family: sans-serif;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .card {
            max-width: 500px;
            margin: 0 auto;
            border: 2px solid #d4af37;
            padding: 30px;
            border-radius: 15px;
            background-color: #1a1f1a;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        h1 {
            color: #d4af37;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        h2 {
            font-weight: 300;
            letter-spacing: 2px;
            font-size: 1.2rem;
            color: #b0b0b0;
            text-transform: uppercase;
        }
        .date {
            border-top: 1px solid #d4af37;
            border-bottom: 1px solid #d4af37;
            padding: 15px 0;
            margin: 30px 0;
            font-size: 1.3rem;
            letter-spacing: 1px;
            color: #d4af37;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #e0e0e0;
        }
        .btn {
            display: inline-block;
            background-color: #d4af37;
            color: #111;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 25px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Вы приглашены на свадьбу</h2>
        <h1>Азамат & Эльвира</h1>
        
        <div class="date">
            18 ИЮЛЯ 2026<br>
            СУББОТА // 11:00
        </div>
        
        <p>Ждем вас, чтобы разделить наше счастье!</p>
        <p>Торжество состоится в ресторане <strong>«Хванчкара»</strong>.</p>
        <p>По адресу: г. Балашиха, ул. Советская, д. 36.</p>
        
        <a href="https://yandex.ru/maps/?text=Балашиха+Советская+36+ресторан+Хванчкара" target="_blank" class="btn">Открыть карту Яндекс</a>
    </div>

</body>
</html>
